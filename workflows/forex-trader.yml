name: Forex Auto Trader

on:
  # 定时触发：每30分钟运行一次
  schedule:
    - cron: '*/30 * * * *'
  
  # 手动触发
  workflow_dispatch:
  
  # 代码推送时触发
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/forex-trader.yml'

jobs:
  forex-trading:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      
      # 2. 设置Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # 3. 安装依赖
      - name: Install dependencies
        run: |
          cd scripts
          npm install axios
      
      # 4. 运行交易机器人
      - name: Run Forex Trading Bot
        env:
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: |
          cd scripts
          node fetch-and-analyze.js
      
      # 5. 提交数据
      - name: Commit and push data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            timestamp=$(date -u +"%Y-%m-%d %H:%M:%S")
            git commit -m "📈 Forex data update $timestamp"
            git push
          fi
